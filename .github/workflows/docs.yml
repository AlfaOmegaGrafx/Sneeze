# Docs — drift detection and wiki transform dry-run for docs/.
# Live publish: .github/workflows/deploy-wiki.yml (push to main + manual dispatch).
#
name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'scripts/publish-wiki.py'
      - 'tools/DocDrift/**'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'scripts/publish-wiki.py'
      - 'tools/DocDrift/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docdrift:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Doc drift check (warn-only)
        run: python tools/DocDrift/docdrift.py

  wiki-transform:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Dry-run wiki transform
        run: python scripts/publish-wiki.py --dry-run --all
