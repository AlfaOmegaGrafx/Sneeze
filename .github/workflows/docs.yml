# Docs — drift detection and Wiki.js publish for docs/.
#
# Source of truth: docs/**/*.md in this repo.
# Publish target: omb.wiki /sneeze/... via scripts/publish-wiki.py (Wiki.js GraphQL).
# Home.md replaces the existing /sneeze landing page.
#
# Until WIKIJS_* secrets are configured, publish is a no-op (exit 0 with notice).
#
name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'scripts/publish-wiki.py'
      - 'tools/DocDrift/**'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'scripts/publish-wiki.py'
      - 'tools/DocDrift/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docdrift:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Doc drift check (warn-only)
        run: python tools/DocDrift/docdrift.py

  wiki-transform:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Dry-run wiki transform
        run: python scripts/publish-wiki.py --dry-run --all

  wiki-publish:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    needs: [docdrift, wiki-transform]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Publish to Wiki.js
        env:
          WIKIJS_GRAPHQL_URL: ${{ secrets.WIKIJS_GRAPHQL_URL }}
          WIKIJS_API_TOKEN: ${{ secrets.WIKIJS_API_TOKEN }}
        run: python scripts/publish-wiki.py --all
