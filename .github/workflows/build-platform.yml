name: Build Platform (reusable)

on:
  workflow_call:
    inputs:
      platform:
        required: true
        type: string
        description: "Platform name for artifact prefix and cache keys"
      runs-on:
        required: true
        type: string
        description: "Runner label"
      cmake-args:
        required: true
        type: string
        description: "Platform-specific CMake args (space-separated)"
      rust-targets:
        required: false
        type: string
        default: ""
        description: "Rust targets to install (comma-separated, empty = no rust)"
      system-deps:
        required: false
        type: string
        default: ""
        description: "apt-get packages to install (Linux only)"
      setup-ndk:
        required: false
        type: boolean
        default: false
        description: "Install Android NDK"
      filament-host-artifact:
        required: false
        type: string
        default: ""
        description: "Artifact name with Filament host tools for cross-compile (e.g. linux-filament)"

jobs:
  tier0:
    runs-on: ${{ inputs.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        dep: [spirv-headers, anari-sdk, openxr-sdk, openssl, curl, rmlui, nlohmann-json, wasmtime, filament]
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        if: inputs.system-deps != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ inputs.system-deps }}

      - name: Setup Android NDK
        if: inputs.setup-ndk
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r27c

      - name: Resolve dep dir name
        id: dir
        run: |
          declare -A MAP=(
            [spirv-headers]=SPIRV-Headers [spirv-tools]=SPIRV-Tools
            [anari-sdk]=ANARI-SDK [openxr-sdk]=OpenXR-SDK
            [rmlui]=RmlUi [wasmtime]=Wasmtime [halogen]=Halogen
          )
          echo "name=${MAP[${{ matrix.dep }}]:-${{ matrix.dep }}}" >> "$GITHUB_OUTPUT"

      - name: Cache ${{ matrix.dep }}
        id: cache
        uses: actions/cache@v4
        with:
          path: libs-${{ inputs.platform }}/${{ steps.dir.outputs.name }}
          key: ${{ inputs.platform }}-${{ matrix.dep }}-${{ hashFiles('CMakeLists.txt') }}

      - name: Install Rust
        if: matrix.dep == 'wasmtime' && steps.cache.outputs.cache-hit != 'true' && inputs.rust-targets != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ inputs.rust-targets }}

      - name: Download Filament host tools
        if: matrix.dep == 'filament' && inputs.filament-host-artifact != '' && steps.cache.outputs.cache-hit != 'true'
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.filament-host-artifact }}
          path: filament-host

      - name: Build ${{ matrix.dep }}
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          ANDROID_NDK_ROOT: ${{ steps.ndk.outputs.ndk-path || '' }}
        run: |
          CMAKE_ARGS="${{ inputs.cmake-args }}"
          CMAKE_ARGS="${CMAKE_ARGS//\$ANDROID_NDK_ROOT/$ANDROID_NDK_ROOT}"

          if [ "${{ matrix.dep }}" = "filament" ] && [ -d "filament-host" ]; then
            HOST_TOOLS=$(find filament-host -name "ImportExecutables*.cmake" -print -quit 2>/dev/null)
            if [ -n "$HOST_TOOLS" ]; then
              CMAKE_ARGS="$CMAKE_ARGS -DIMPORT_EXECUTABLES=${{ github.workspace }}/$HOST_TOOLS"
            fi
          fi

          cmake -S . -B build -GNinja -DLIBS_DIR=${{ github.workspace }}/libs-${{ inputs.platform }} $CMAKE_ARGS
          cmake --build build --target ${{ matrix.dep }} --parallel $(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Upload dep artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.platform }}-${{ matrix.dep }}
          path: libs-${{ inputs.platform }}
          retention-days: 3

  tier1:
    needs: tier0
    if: ${{ !cancelled() }}
    runs-on: ${{ inputs.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - dep: spirv-tools
          - dep: halogen
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        if: inputs.system-deps != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ inputs.system-deps }}

      - name: Setup Android NDK
        if: inputs.setup-ndk
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r27c

      - name: Download tier0 artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ inputs.platform }}-*
          path: .
          merge-multiple: true

      - name: Build ${{ matrix.dep }}
        env:
          ANDROID_NDK_ROOT: ${{ steps.ndk.outputs.ndk-path || '' }}
        run: |
          CMAKE_ARGS="${{ inputs.cmake-args }}"
          CMAKE_ARGS="${CMAKE_ARGS//\$ANDROID_NDK_ROOT/$ANDROID_NDK_ROOT}"
          echo "Available deps:" && ls libs-${{ inputs.platform }}/ || true
          cmake -S . -B build -GNinja -DLIBS_DIR=${{ github.workspace }}/libs-${{ inputs.platform }} $CMAKE_ARGS
          cmake --build build --target ${{ matrix.dep }} --parallel $(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Upload dep artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.platform }}-${{ matrix.dep }}
          path: libs-${{ inputs.platform }}
          retention-days: 3

  tier2:
    needs: tier1
    if: ${{ !cancelled() }}
    runs-on: ${{ inputs.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - dep: glslang
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        if: inputs.system-deps != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ inputs.system-deps }}

      - name: Setup Android NDK
        if: inputs.setup-ndk
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r27c

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ inputs.platform }}-*
          path: .
          merge-multiple: true

      - name: Build ${{ matrix.dep }}
        env:
          ANDROID_NDK_ROOT: ${{ steps.ndk.outputs.ndk-path || '' }}
        run: |
          CMAKE_ARGS="${{ inputs.cmake-args }}"
          CMAKE_ARGS="${CMAKE_ARGS//\$ANDROID_NDK_ROOT/$ANDROID_NDK_ROOT}"
          echo "Available deps:" && ls libs-${{ inputs.platform }}/ || true
          cmake -S . -B build -GNinja -DLIBS_DIR=${{ github.workspace }}/libs-${{ inputs.platform }} $CMAKE_ARGS
          cmake --build build --target ${{ matrix.dep }} --parallel $(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Upload dep artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.platform }}-${{ matrix.dep }}
          path: libs-${{ inputs.platform }}
          retention-days: 3

  sneeze:
    needs: [tier0, tier1, tier2]
    if: ${{ !cancelled() && !contains(needs.*.result, 'failure') }}
    runs-on: ${{ inputs.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        if: inputs.system-deps != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ inputs.system-deps }}

      - name: Setup Android NDK
        if: inputs.setup-ndk
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r27c

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ inputs.platform }}-*
          path: .
          merge-multiple: true

      - name: List deps
        run: echo "Available deps:" && ls libs-${{ inputs.platform }}/ || true

      - name: Install Rust
        if: inputs.rust-targets != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ inputs.rust-targets }}

      - name: Build Sneeze
        env:
          ANDROID_NDK_ROOT: ${{ steps.ndk.outputs.ndk-path || '' }}
        run: |
          CMAKE_ARGS="${{ inputs.cmake-args }}"
          CMAKE_ARGS="${CMAKE_ARGS//\$ANDROID_NDK_ROOT/$ANDROID_NDK_ROOT}"
          cmake -S . -B build -GNinja -DLIBS_DIR=${{ github.workspace }}/libs-${{ inputs.platform }} $CMAKE_ARGS
          cmake --build build --target sneeze --parallel $(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Run tests
        if: ${{ !inputs.setup-ndk }}
        run: |
          cd build/sneeze
          ctest --output-on-failure --parallel $(nproc 2>/dev/null || sysctl -n hw.ncpu) || true
