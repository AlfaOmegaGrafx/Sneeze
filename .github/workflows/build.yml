name: Build

on:
  push:
    branches: [main, porting/*]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # macOS — all deps in one job (order matters for dep chains), then Sneeze
  # ---------------------------------------------------------------------------

  macos-deps:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Cache libs
        id: cache
        uses: actions/cache@v4
        with:
          path: libs-macos
          key: macos-libs-${{ hashFiles('CMakeLists.txt') }}

      - name: Install Rust
        if: steps.cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Build all deps
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/build-deps.sh
          ./scripts/build-deps.sh \
            --build-dir build-macos \
            --libs-dir ${{ github.workspace }}/libs-macos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0

      - name: Upload libs artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-libs
          path: libs-macos
          retention-days: 7

  macos-sneeze:
    needs: macos-deps
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Download libs
        uses: actions/download-artifact@v4
        with:
          name: macos-libs
          path: libs-macos

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Sneeze
        run: |
          cmake -S . -B build-macos \
            -DLIBS_DIR=${{ github.workspace }}/libs-macos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0
          cmake --build build-macos --target sneeze --parallel $(sysctl -n hw.ncpu)

      - name: Run tests
        run: |
          cd build-macos/sneeze
          ctest --output-on-failure --parallel $(sysctl -n hw.ncpu) || true

  # ---------------------------------------------------------------------------
  # Linux x64 — clang + libc++
  # ---------------------------------------------------------------------------

  linux-deps:
    runs-on: ubuntu-22.04
    env:
      CC: clang
      CXX: clang++
    steps:
      - uses: actions/checkout@v4

      - name: Install clang + libc++ + GL/Vulkan/X11 headers
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld libc++-dev libc++abi-dev \
            libvulkan-dev libgl-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev

      - name: Cache libs
        id: cache
        uses: actions/cache@v4
        with:
          path: libs-linux
          key: linux-libs-${{ hashFiles('CMakeLists.txt') }}

      - name: Install Rust
        if: steps.cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Build all deps
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/build-deps.sh
          ./scripts/build-deps.sh \
            --build-dir build-linux \
            --libs-dir ${{ github.workspace }}/libs-linux \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain-linux-clang.cmake

      - name: Upload libs artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-libs
          path: libs-linux
          retention-days: 7

  linux-sneeze:
    needs: linux-deps
    runs-on: ubuntu-22.04
    env:
      CC: clang
      CXX: clang++
    steps:
      - uses: actions/checkout@v4

      - name: Install clang + libc++ + GL/Vulkan/X11 headers
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld libc++-dev libc++abi-dev \
            libvulkan-dev libgl-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev

      - name: Download libs
        uses: actions/download-artifact@v4
        with:
          name: linux-libs
          path: libs-linux

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Sneeze
        run: |
          cmake -S . -B build-linux \
            -DLIBS_DIR=${{ github.workspace }}/libs-linux \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain-linux-clang.cmake
          cmake --build build-linux --target sneeze --parallel $(nproc)

      - name: Run tests
        run: |
          cd build-linux/sneeze
          ctest --output-on-failure --parallel $(nproc) || true
